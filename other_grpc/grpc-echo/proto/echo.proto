syntax = "proto3";

package echo;

option go_package = "github.com/joss12/grpc-echo/proto";

// The request message — carries a text payload
message EchoRequest {
  string message = 1;
}

// The response message — echoes back the text
message EchoResponse {
  string message = 1;
}

// The service definition — one unary RPC method
service EchoService {
  rpc Echo(EchoRequest) returns (EchoResponse);
}
